alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95_ms > 5000 for 30m
    metric: latency_p95_ms
    operator: ">"
    threshold: 5000
    demo_threshold: 2000
    for: 30m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 5 for 5m
    metric: error_rate_pct
    operator: ">"
    threshold: 5
    demo_threshold: 5
    for: 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
  - name: cost_budget_spike
    severity: P2
    condition: avg_cost_usd > 0.005 for 15m
    metric: avg_cost_usd
    operator: ">"
    threshold: 0.005
    demo_threshold: 0.005
    for: 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike
