service: day13-observability-lab
window: 28d
slis:
  latency_p95_ms:
    objective: 3000
    target: 99.5
    rationale: Normal requests complete in under 1s; 3s leaves headroom and catches slow retrieval.
  error_rate_pct:
    objective: 2
    target: 99.0
  daily_cost_usd:
    objective: 2.5
    target: 100.0
  quality_score_avg:
    objective: 0.75
    target: 95.0
